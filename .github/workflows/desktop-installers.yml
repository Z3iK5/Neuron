# Builds the Neuron Desktop app for macOS, Windows and Linux with PyInstaller and
# uploads the bundles as artifacts (and as release assets on a tag push).
#
# This must run on each OS — PyInstaller cannot cross-compile — so GitHub's macOS,
# Windows and Ubuntu runners each build their own bundle, then wrap it into a native
# installer: macOS `.dmg`, Linux `.AppImage`, Windows `.exe` (Inno Setup). Code
# signing / notarization are follow-ups (see docs/desktop.md).

name: Desktop installers

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Cut a release with this tag (e.g. v0.0.1). Empty = artifacts-only build."
        required: false
        default: ""

permissions:
  contents: write # needed to create the release / attach assets on a release build

jobs:
  build:
    name: Build (${{ matrix.label }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            label: macos
          - os: windows-latest
            label: windows
          - os: ubuntu-latest
            label: linux
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: neuron

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install the desktop app and PyInstaller
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[desktop-gui]" pyinstaller

      - name: Render the macOS app icon (.icns)
        if: matrix.os == 'macos-latest'
        run: python packaging/make_icns.py

      - name: Build the app bundle
        run: pyinstaller --noconfirm packaging/neuron_desktop.spec

      - name: Smoke-test the bundle (non-GUI command)
        # Confirms the frozen bundle starts and its CLI works without a display.
        shell: bash
        run: |
          case "${{ matrix.os }}" in
            windows-latest) ./dist/Neuron/Neuron.exe where ;;
            macos-latest)   ./dist/Neuron.app/Contents/MacOS/Neuron where ;;
            *)              ./dist/Neuron/Neuron where ;;
          esac

      - name: Archive the bundle
        run: python -c "import shutil; shutil.make_archive('neuron-${{ matrix.label }}', 'zip', 'dist')"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: neuron-${{ matrix.label }}
          path: neuron/neuron-${{ matrix.label }}.zip

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/') || inputs.tag != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          generate_release_notes: true
          files: neuron/neuron-${{ matrix.label }}.zip

      # --- macOS native installer (.dmg) ------------------------------------
      - name: Build the macOS .dmg
        if: matrix.os == 'macos-latest'
        run: bash packaging/make_dmg.sh neuron-macos.dmg

      - name: Upload .dmg artifact
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: neuron-macos-dmg
          path: neuron/neuron-macos.dmg

      - name: Attach .dmg to release
        if: matrix.os == 'macos-latest' && (startsWith(github.ref, 'refs/tags/') || inputs.tag != '')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          generate_release_notes: true
          files: neuron/neuron-macos.dmg

      # --- Linux native installer (AppImage) --------------------------------
      - name: Build the Linux AppImage
        if: matrix.os == 'ubuntu-latest'
        run: bash packaging/make_appimage.sh neuron-x86_64.AppImage

      - name: Smoke-test the AppImage (non-GUI command)
        if: matrix.os == 'ubuntu-latest'
        run: APPIMAGE_EXTRACT_AND_RUN=1 ./neuron-x86_64.AppImage where

      - name: Upload AppImage artifact
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: neuron-linux-appimage
          path: neuron/neuron-x86_64.AppImage

      - name: Attach AppImage to release
        if: matrix.os == 'ubuntu-latest' && (startsWith(github.ref, 'refs/tags/') || inputs.tag != '')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          generate_release_notes: true
          files: neuron/neuron-x86_64.AppImage

      # --- Windows native installer (.exe via Inno Setup) -------------------
      - name: Build the Windows installer (Inno Setup)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) { choco install innosetup --yes --no-progress }
          if (-not (Test-Path $iscc)) { throw "ISCC.exe not found after install" }
          & $iscc "packaging\neuron.iss"
          if ($LASTEXITCODE -ne 0) { throw "ISCC failed ($LASTEXITCODE)" }

      - name: Smoke-test the installer (silent install + run)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          if (-not (Test-Path "Neuron-Setup-x64.exe")) { throw "installer not produced" }
          Start-Process -Wait -FilePath ".\Neuron-Setup-x64.exe" `
            -ArgumentList "/VERYSILENT","/SUPPRESSMSGBOXES","/NORESTART"
          $app = Join-Path $env:LOCALAPPDATA "Programs\Neuron\Neuron.exe"
          if (-not (Test-Path $app)) { throw "installed app not found at $app" }
          $p = Start-Process -Wait -PassThru -FilePath $app -ArgumentList "where"
          if ($p.ExitCode -ne 0) { throw "installed app failed ($($p.ExitCode))" }

      - name: Upload Windows installer artifact
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: neuron-windows-installer
          path: neuron/Neuron-Setup-x64.exe

      - name: Attach Windows installer to release
        if: matrix.os == 'windows-latest' && (startsWith(github.ref, 'refs/tags/') || inputs.tag != '')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          generate_release_notes: true
          files: neuron/Neuron-Setup-x64.exe
