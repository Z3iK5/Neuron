# Builds the Neuron Desktop app for macOS, Windows and Linux with PyInstaller and
# uploads the bundles as artifacts (and as release assets on a tag push).
#
# This must run on each OS — PyInstaller cannot cross-compile — so GitHub's macOS,
# Windows and Ubuntu runners each build their own bundle, then wrap it into a native
# installer: macOS `.dmg`, Linux `.AppImage`, Windows `.exe` (Inno Setup). Code
# signing / notarization are follow-ups (see docs/desktop.md).

name: Desktop installers

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Cut a release with this tag (e.g. v0.0.1). Empty = artifacts-only build."
        required: false
        default: ""

permissions:
  contents: write # needed to create the release / attach assets on a release build

jobs:
  build:
    name: Build (${{ matrix.label }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            label: macos
          - os: windows-latest
            label: windows
          - os: ubuntu-latest
            label: linux
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: neuron

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install the desktop app and PyInstaller
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[desktop-gui]" pyinstaller

      - name: Render the macOS app icon (.icns)
        if: matrix.os == 'macos-latest'
        run: python packaging/make_icns.py

      - name: Build the app bundle
        run: pyinstaller --noconfirm packaging/neuron_desktop.spec

      # --- macOS code signing (Developer ID; only when the secrets are present) ---
      - name: Import Developer ID certificate
        if: matrix.os == 'macos-latest'
        shell: bash
        env:
          MACOS_CERT_P12: ${{ secrets.MACOS_CERT_P12 }}
          MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
        run: |
          if [ -z "$MACOS_CERT_P12" ]; then
            echo "No MACOS_CERT_P12 secret set — building unsigned."
            echo "MACOS_SIGNED=0" >> "$GITHUB_ENV"
            exit 0
          fi
          KEYCHAIN="$RUNNER_TEMP/neuron-signing.keychain-db"
          KEYCHAIN_PWD="$(openssl rand -hex 20)"
          security create-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN"
          printf '%s' "$MACOS_CERT_P12" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" -P "$MACOS_CERT_PASSWORD" \
            -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PWD" "$KEYCHAIN" >/dev/null
          # Make the new keychain searchable alongside the defaults.
          security list-keychains -d user -s "$KEYCHAIN" \
            $(security list-keychains -d user | sed s/\"//g)
          IDENTITY="$(security find-identity -v -p codesigning "$KEYCHAIN" \
            | awk '/Developer ID Application/{print $2; exit}')"
          if [ -z "$IDENTITY" ]; then
            echo "No 'Developer ID Application' identity found in the imported cert." >&2
            exit 1
          fi
          rm -f "$RUNNER_TEMP/cert.p12"
          {
            echo "MACOS_SIGNED=1"
            echo "MACOS_IDENTITY=$IDENTITY"
            echo "MACOS_KEYCHAIN=$KEYCHAIN"
          } >> "$GITHUB_ENV"

      - name: Sign the macOS app
        if: matrix.os == 'macos-latest' && env.MACOS_SIGNED == '1'
        run: bash packaging/macos_sign.sh dist/Neuron.app

      - name: Smoke-test the bundle (non-GUI command)
        # Confirms the frozen bundle starts and its CLI works without a display.
        shell: bash
        run: |
          case "${{ matrix.os }}" in
            windows-latest) ./dist/Neuron/Neuron.exe where ;;
            macos-latest)   ./dist/Neuron.app/Contents/MacOS/Neuron where ;;
            *)              ./dist/Neuron/Neuron where ;;
          esac

      - name: Archive the bundle
        run: python -c "import shutil; shutil.make_archive('neuron-${{ matrix.label }}', 'zip', 'dist')"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: neuron-${{ matrix.label }}
          path: neuron/neuron-${{ matrix.label }}.zip

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/') || inputs.tag != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          files: neuron/neuron-${{ matrix.label }}.zip

      # --- macOS native installer (.dmg) ------------------------------------
      - name: Build the macOS .dmg
        if: matrix.os == 'macos-latest'
        run: bash packaging/make_dmg.sh neuron-macos.dmg

      - name: Sign & notarize the .dmg
        if: matrix.os == 'macos-latest' && env.MACOS_SIGNED == '1'
        shell: bash
        env:
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
        run: |
          codesign --force --timestamp --sign "$MACOS_IDENTITY" \
            --keychain "$MACOS_KEYCHAIN" neuron-macos.dmg
          if [ -z "$APPLE_API_KEY_P8" ]; then
            echo "Signed, but no notarization API key set — skipping notarization."
            exit 0
          fi
          bash packaging/macos_notarize.sh neuron-macos.dmg

      - name: Upload .dmg artifact
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: neuron-macos-dmg
          path: neuron/neuron-macos.dmg

      - name: Attach .dmg to release
        if: matrix.os == 'macos-latest' && (startsWith(github.ref, 'refs/tags/') || inputs.tag != '')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          files: neuron/neuron-macos.dmg

      # --- Linux native installer (AppImage) --------------------------------
      - name: Build the Linux AppImage
        if: matrix.os == 'ubuntu-latest'
        run: bash packaging/make_appimage.sh neuron-x86_64.AppImage

      - name: Smoke-test the AppImage (non-GUI command)
        if: matrix.os == 'ubuntu-latest'
        run: APPIMAGE_EXTRACT_AND_RUN=1 ./neuron-x86_64.AppImage where

      - name: Upload AppImage artifact
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: neuron-linux-appimage
          path: neuron/neuron-x86_64.AppImage

      - name: Attach AppImage to release
        if: matrix.os == 'ubuntu-latest' && (startsWith(github.ref, 'refs/tags/') || inputs.tag != '')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          files: neuron/neuron-x86_64.AppImage

      # --- Windows native installer (.exe via Inno Setup) -------------------
      - name: Build the Windows installer (Inno Setup)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) { choco install innosetup --yes --no-progress }
          if (-not (Test-Path $iscc)) { throw "ISCC.exe not found after install" }
          & $iscc "packaging\neuron.iss"
          if ($LASTEXITCODE -ne 0) { throw "ISCC failed ($LASTEXITCODE)" }

      - name: Smoke-test the installer (silent install + run)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          if (-not (Test-Path "Neuron-Setup-x64.exe")) { throw "installer not produced" }
          Start-Process -Wait -FilePath ".\Neuron-Setup-x64.exe" `
            -ArgumentList "/VERYSILENT","/SUPPRESSMSGBOXES","/NORESTART"
          $app = Join-Path $env:LOCALAPPDATA "Programs\Neuron\Neuron.exe"
          if (-not (Test-Path $app)) { throw "installed app not found at $app" }
          $p = Start-Process -Wait -PassThru -FilePath $app -ArgumentList "where"
          if ($p.ExitCode -ne 0) { throw "installed app failed ($($p.ExitCode))" }

      - name: Upload Windows installer artifact
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: neuron-windows-installer
          path: neuron/Neuron-Setup-x64.exe

      - name: Attach Windows installer to release
        if: matrix.os == 'windows-latest' && (startsWith(github.ref, 'refs/tags/') || inputs.tag != '')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          files: neuron/Neuron-Setup-x64.exe

      # --- Windows MSIX (for the Microsoft Store) ---------------------------
      # Built every run and uploaded as a workflow artifact ONLY (never attached to
      # the GitHub release). Identity comes from the MSIX_* repo variables when set;
      # otherwise it is self-signed for sideload testing.
      - name: Build the Windows MSIX
        if: matrix.os == 'windows-latest'
        shell: pwsh
        env:
          MSIX_IDENTITY_NAME: ${{ vars.MSIX_IDENTITY_NAME }}
          MSIX_PUBLISHER: ${{ vars.MSIX_PUBLISHER }}
          MSIX_PUBLISHER_DISPLAY_NAME: ${{ vars.MSIX_PUBLISHER_DISPLAY_NAME }}
        run: pwsh packaging/make_msix.ps1

      - name: Upload MSIX artifact
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: neuron-windows-msix
          path: |
            neuron/Neuron.msix
            neuron/Neuron-dev-cert.cer
          if-no-files-found: warn

  # Generate the release's "What's Changed" notes exactly once, after the build
  # jobs have created the release and attached their assets. (Doing this in each
  # matrix job appends the notes repeatedly.)
  release-notes:
    name: Release notes
    needs: build
    if: startsWith(github.ref, 'refs/tags/') || inputs.tag != ''
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Generate release notes
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          generate_release_notes: true
