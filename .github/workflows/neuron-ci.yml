# CI for the Neuron services (separate from Synapse's own CI).
#
# Runs only when files under neuron/ change, so it never interferes with the
# upstream Synapse workflows in this repository.

name: Neuron CI

on:
  push:
    branches: ["**"]
    paths:
      - "neuron/**"
      - ".github/workflows/neuron-ci.yml"
  pull_request:
    paths:
      - "neuron/**"
      - ".github/workflows/neuron-ci.yml"

# Avoid running duplicate jobs for the same ref.
concurrency:
  group: neuron-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-type-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: neuron
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Neuron with dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check .

      - name: Type check (mypy)
        run: mypy

      - name: Unit tests (pytest)
        # Integration tests under tests/integration are skipped automatically
        # unless NEURON_HOMESERVER_URL / NEURON_HOMESERVER_ADMIN_TOKEN are set.
        run: pytest -q

  # Exercises the real PostgreSQL backend (asyncpg pool + sequence id allocation,
  # incl. concurrent writes) — the SQLite job above can't catch PG dialect issues.
  postgres:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: neuron
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: neuron
          POSTGRES_PASSWORD: neuron
          POSTGRES_DB: neuron
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Neuron with dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: PostgreSQL integration tests
        env:
          NEURON_TEST_DATABASE_URL: postgresql://neuron:neuron@localhost:5432/neuron
        run: pytest tests/integration/test_postgres.py -v
