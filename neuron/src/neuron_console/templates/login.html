{% extends "base.html" %}
{% block title %}Log in — NEURON Console{% endblock %}
{% block content %}
<div class="auth">
  <div class="auth-head">
    <span class="auth-mark">{{ neuron_mark | safe }}</span>
    <div>
      <div class="auth-name">{{ neuron_name }}</div>
      <div class="auth-tag">{{ neuron_tagline }}</div>
    </div>
  </div>
  <div class="auth-body">
    <h1>Sign in to the console</h1>
    {% if error %}<p class="error">{{ error }}</p>{% endif %}
    <form method="post" action="/login">
      <label for="password">Console password</label>
      <input type="password" id="password" name="password" autofocus required>
      <button type="submit">Log in</button>
    </form>
    <div class="auth-alt">
      <span>or</span>
      <button type="button" id="passkey-login" class="secondary">Sign in with a passkey</button>
      <p class="error" id="passkey-error" hidden></p>
    </div>
  </div>
</div>
<script src="{{ url_for('static', path='/webauthn.js') }}"></script>
<script>
  document.getElementById("passkey-login").addEventListener("click", function () {
    neuronPasskeyLogin("passkey-error");
  });
</script>
{% endblock %}
